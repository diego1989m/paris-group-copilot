# Sobe a stack do Paris Group Copilot com um comando: docker compose up
# Dois serviços: o banco PostgreSQL e o backend FastAPI.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: paris
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/paris
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
